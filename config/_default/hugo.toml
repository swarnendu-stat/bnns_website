baseURL = "https://swarnendu-stat.netlify.app/"
title = "SC Perspective"
theme = "hugo-theme-stack"
enableRobotsTXT = true
languageCode = "en-US"
copyright = "Swarnendu Chatterjee. All rights reserved."

# Global author config for Hugo's internal templates (like RSS)
[author]
  name = "Swarnendu Chatterjee"
  email = "swarnendu.stat@gmail.com"

# Google Analytics (Replace with your actual G-XXXXXXX measurement ID when ready)
googleAnalytics = "G-MEASUREMENT_ID"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[services.rss]
  limit = 20

# Protect specific file types from Hugo's aggressive minifier
[minify]
  disableXML = true
  disableJSON = false
  disableHTML = false
  disableJS = false
  disableCSS = false

[module.hugoVersion]
min = "0.163.1"

# knitr/hugodown emits figures as HTML <img> tags. Goldmark removes raw HTML
# unless it is explicitly enabled, which makes successfully generated plots
# disappear from rendered posts.
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[mediaTypes]
  [mediaTypes."text/markdown"]
    suffixes = ["md"]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.Markdown]
    mediaType = "text/markdown"
    isPlainText = true
    isHTML = false
  [outputFormats.llmstxt]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.llmsfulltxt]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ['html', 'rss', 'llmstxt', 'llmsfulltxt']
  section = ['html', 'rss']
  taxonomy = ['html']
  term = ['html']
  page = ['html', 'Markdown']

[params]
  mainSection = "post"
  description = "A blog about Statistics, R programming, Data Analysis, Data Science, and Photography."
  keywords = ["R programming", "Statistics", "Data Science", "Data Analysis", "Photography", "R Blog"]
  
  [params.author]
    name = "Swarnendu"
    email = "swarnendu.stat@gmail.com"
  
  # Author sidebar configuration
  [params.sidebar]
    subtitle = "Statistician & R Enthusiast. Unlocking the power of data. I also love photography!"
    emoji = "📊"
    
    [params.sidebar.avatar]
      enabled = true
      local = false
      src = "https://github.com/swarnendu-stat.png"

  # Article features (Math support is crucial for your stats/R posts!)
  [params.article]
    math = true
    readingTime = true

# Social Links
